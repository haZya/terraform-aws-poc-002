name: Terraform Checks

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  TF_INPUT: false
  TF_IN_AUTOMATION: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        working-directory:
          - bootstrap/state
          - bootstrap/accounts/staging
          - bootstrap/accounts/prod
          - envs/dev/global
          - envs/dev/regional
          - envs/staging/global
          - envs/staging/regional
          - envs/prod/global
          - envs/prod/regional

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.0

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: ${{ matrix.working-directory }}
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: ${{ matrix.working-directory }}
        run: terraform validate

  resolve-regions:
    name: Resolve Regions
    runs-on: ubuntu-latest
    outputs:
      regions: ${{ steps.resolve.outputs.regions }}

    steps:
      - name: Resolve target regions
        id: resolve
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          AWS_REGIONS_JSON: ${{ vars.AWS_REGIONS_JSON }}
        run: |
          if [ -n "$AWS_REGIONS_JSON" ]; then
            regions="$AWS_REGIONS_JSON"
          elif [ -n "$AWS_REGION" ]; then
            regions="$(jq -cn --arg region "$AWS_REGION" '[$region]')"
          else
            regions='["ap-southeast-2"]'
          fi

          echo "$regions" | jq -e 'type == "array" and length > 0 and all(.[]; type == "string" and length > 0)' > /dev/null
          echo "Resolved regions: $regions"
          echo "regions=$regions" >> "$GITHUB_OUTPUT"

  plan-staging-global:
    name: Plan Staging Global
    runs-on: ubuntu-latest
    needs:
      - validate
    if: github.event.pull_request.head.repo.full_name == github.repository
    environment: staging
    permissions:
      contents: read
      id-token: write
      issues: write
      pull-requests: write
    env:
      TF_WORKING_DIR: envs/staging/global
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
      TF_STATE_KEY: poc-001/staging/global/terraform.tfstate
      TF_STATE_REGION: ${{ vars.TF_STATE_REGION || vars.AWS_REGION || 'ap-southeast-2' }}
      TF_VAR_aws_account_id: ${{ vars.AWS_ACCOUNT_ID }}
      TF_VAR_region: ${{ vars.TF_GLOBAL_REGION || vars.TF_STATE_REGION || vars.AWS_REGION || 'ap-southeast-2' }}
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check GitHub variables
        run: |
          missing=0

          if [ -z "$AWS_ROLE_ARN" ]; then
            echo "::error::Set AWS_ROLE_ARN on the staging GitHub environment."
            missing=1
          fi

          if [ -z "$TF_STATE_BUCKET" ]; then
            echo "::error::Set TF_STATE_BUCKET as a repository variable or on the staging GitHub environment."
            missing=1
          fi

          if [ -z "$TF_VAR_aws_account_id" ]; then
            echo "::error::Set AWS_ACCOUNT_ID on the staging GitHub environment."
            missing=1
          fi

          exit "$missing"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.TF_VAR_region }}
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          allowed-account-ids: ${{ env.TF_VAR_aws_account_id }}
          output-env-credentials: true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.0

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${TF_STATE_REGION}" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true"

      - name: Terraform plan
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_PLAN_OUTPUT: ${{ runner.temp }}/terraform-plan-staging-global.txt
        run: |
          set +e
          terraform plan -lock=false -no-color > "$TF_PLAN_OUTPUT" 2>&1
          exit_code=$?
          cat "$TF_PLAN_OUTPUT"
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit "$exit_code"

      - name: Comment Terraform plan
        if: always() && steps.plan.outcome != 'skipped'
        continue-on-error: true
        uses: actions/github-script@v8
        env:
          PLAN_EXIT_CODE: ${{ steps.plan.outputs.exit_code }}
          PLAN_MARKER: '<!-- terraform-plan:staging-global -->'
          PLAN_TITLE: 'Terraform Plan: Staging Global'
          TF_PLAN_OUTPUT: ${{ runner.temp }}/terraform-plan-staging-global.txt
        with:
          script: |
            const fs = require('fs');

            const marker = process.env.PLAN_MARKER;
            const outputPath = process.env.TF_PLAN_OUTPUT;
            const rawPlan = fs.existsSync(outputPath)
              ? fs.readFileSync(outputPath, 'utf8').trim()
              : 'Terraform plan did not produce output.';
            const maxPlanLength = 60000;
            const plan = rawPlan.length > maxPlanLength
              ? `${rawPlan.slice(0, maxPlanLength)}\n\n[Plan output truncated. See workflow logs for the full output.]`
              : rawPlan;
            const status = process.env.PLAN_EXIT_CODE === '0' ? 'succeeded' : 'failed';
            const body = [
              marker,
              `### ${process.env.PLAN_TITLE}`,
              '',
              `Terraform plan ${status}.`,
              '',
              '<details><summary>Show plan output</summary>',
              '',
              '```terraform',
              plan,
              '```',
              '',
              '</details>',
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existingComment = comments.find((comment) =>
              comment.user.type === 'Bot' && comment.body.includes(marker)
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existingComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

  plan-staging-regional:
    name: Plan Staging Regional (${{ matrix.region }})
    runs-on: ubuntu-latest
    needs:
      - validate
      - resolve-regions
    if: github.event.pull_request.head.repo.full_name == github.repository
    environment: staging
    strategy:
      fail-fast: false
      matrix:
        region: ${{ fromJson(needs.resolve-regions.outputs.regions) }}
    permissions:
      contents: read
      id-token: write
      issues: write
      pull-requests: write
    env:
      TF_WORKING_DIR: envs/staging/regional
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
      TF_STATE_KEY: poc-001/staging/${{ matrix.region }}/terraform.tfstate
      TF_STATE_REGION: ${{ vars.TF_STATE_REGION || vars.AWS_REGION || matrix.region }}
      TF_VAR_aws_account_id: ${{ vars.AWS_ACCOUNT_ID }}
      TF_VAR_region: ${{ matrix.region }}
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check GitHub variables
        run: |
          missing=0

          if [ -z "$AWS_ROLE_ARN" ]; then
            echo "::error::Set AWS_ROLE_ARN on the staging GitHub environment."
            missing=1
          fi

          if [ -z "$TF_STATE_BUCKET" ]; then
            echo "::error::Set TF_STATE_BUCKET as a repository variable or on the staging GitHub environment."
            missing=1
          fi

          if [ -z "$TF_VAR_aws_account_id" ]; then
            echo "::error::Set AWS_ACCOUNT_ID on the staging GitHub environment."
            missing=1
          fi

          exit "$missing"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ matrix.region }}
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          allowed-account-ids: ${{ env.TF_VAR_aws_account_id }}
          output-env-credentials: true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.0

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${TF_STATE_REGION}" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true"

      - name: Terraform plan
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_PLAN_OUTPUT: ${{ runner.temp }}/terraform-plan-staging-regional-${{ matrix.region }}.txt
        run: |
          set +e
          terraform plan -lock=false -no-color > "$TF_PLAN_OUTPUT" 2>&1
          exit_code=$?
          cat "$TF_PLAN_OUTPUT"
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit "$exit_code"

      - name: Comment Terraform plan
        if: always() && steps.plan.outcome != 'skipped'
        continue-on-error: true
        uses: actions/github-script@v8
        env:
          PLAN_EXIT_CODE: ${{ steps.plan.outputs.exit_code }}
          PLAN_MARKER: '<!-- terraform-plan:staging-regional:${{ matrix.region }} -->'
          PLAN_TITLE: 'Terraform Plan: Staging Regional (${{ matrix.region }})'
          TF_PLAN_OUTPUT: ${{ runner.temp }}/terraform-plan-staging-regional-${{ matrix.region }}.txt
        with:
          script: |
            const fs = require('fs');

            const marker = process.env.PLAN_MARKER;
            const outputPath = process.env.TF_PLAN_OUTPUT;
            const rawPlan = fs.existsSync(outputPath)
              ? fs.readFileSync(outputPath, 'utf8').trim()
              : 'Terraform plan did not produce output.';
            const maxPlanLength = 60000;
            const plan = rawPlan.length > maxPlanLength
              ? `${rawPlan.slice(0, maxPlanLength)}\n\n[Plan output truncated. See workflow logs for the full output.]`
              : rawPlan;
            const status = process.env.PLAN_EXIT_CODE === '0' ? 'succeeded' : 'failed';
            const body = [
              marker,
              `### ${process.env.PLAN_TITLE}`,
              '',
              `Terraform plan ${status}.`,
              '',
              '<details><summary>Show plan output</summary>',
              '',
              '```terraform',
              plan,
              '```',
              '',
              '</details>',
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existingComment = comments.find((comment) =>
              comment.user.type === 'Bot' && comment.body.includes(marker)
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existingComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
